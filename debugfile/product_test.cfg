filament_load_gcode_1=M400\nG28 X Y TRY\nM104 S250\nM204 S10000\nG90\nG1 X52 Y245 F10000\nG1 Y264.5 F3000\nM109 S250\n
filament_load_gcode_2=\nM400\nM83\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nM400\nM106 S225\nG4 P3000\nM204 S18999\nG1 Y261.1 E-0.1 F10000\nG1 Y264.1 E-0.1\nM400\nG1 Y261.1 E-0.1\nG1 Y264.1 E-0.1\nM400\nG1 X64 F8000\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X52 Y245 F10000\nG1 Y264.5 F3000\nM400\nM106 S0\nM204 S5000\nM104 S0\n
runout_gcode=M400\n

[cover_switch_sensor]
