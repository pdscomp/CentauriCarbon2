# Date:2025-09-18
# 01.01.11.16
# 新结构-01.01.01.07

[printer]
kinematics=corexy
max_velocity= 500
max_accel= 20000
max_z_velocity= 50
max_z_accel= 1200
x_range=0,256
y_range=0,256
z_range=0,256
square_corner_velocity=9.

[mcu]
serial=/dev/rpmsg_ctrl-dsp_rproc@0
restart_method= remoterpc

[mcu toolhead]
serial=/dev/ttyS3
baud=250000
power_pin=host:PE17
restart_method=command

[mcu bed_sensor]
serial=/dev/ttyS0
baud=500000
power_pin=host:PB11
restart_method= command

# Steppers
[stepper_x]
step_pin=PG18
dir_pin=!PF1
enable_pin=!PF6
microsteps=16
rotation_distance=39.872
endstop_pin=tmc2209_stepper_x:virtual_endstop
position_endstop=-2
position_min=-2.1
position_max=256.5
# 默认不生效,会被homing_override覆盖
homing_speed=60
homing_retract_dist=0

[tmc2209 stepper_x]
uart_pin=PE6
tx_pin=PE7
uart_address=0
interpolate=True
run_current=1.2
hold_current=0.8
sense_resistor=0.1
driver_SGTHRS=130
diag_pin=PF0
# stealthchop_threshold=0

[stepper_y]
step_pin=PG16
dir_pin=!PG17
enable_pin=!PE15
microsteps=16
rotation_distance=39.872
endstop_pin=tmc2209_stepper_y:virtual_endstop
position_endstop=-2
position_min=-2.1
position_max=270.000000
# 默认不生效,会被homing_override覆盖
homing_speed=60
homing_retract_dist=0

[tmc2209 stepper_y]
uart_pin=PE6
tx_pin=PE7
uart_address=3
interpolate=True
run_current=1.2
hold_current=0.8
sense_resistor=0.1
driver_SGTHRS=130
diag_pin=PF3
# stealthchop_threshold=0

[stepper_z]
step_pin=PE16
dir_pin=!PF5
enable_pin=!PE12
microsteps=16
rotation_distance=8
endstop_pin=probe:z_virtual_endstop
z_endstop_pin=tmc2209_stepper_z:virtual_endstop
# endstop_pin=^PB10
position_endstop=0
position_min=-10
position_max=258.000000
homing_speed=10
homing_retract_dist=1
second_homing_speed=5

[tmc2209 stepper_z]
uart_pin=PE6
tx_pin=PE7
uart_address=1
interpolate=True
run_current=1.0
sense_resistor=0.1
driver_SGTHRS=120
diag_pin=PE14
# stealthchop_threshold=0

# 挤出机
[extruder]
# step_pin=toolhead:PA1
# dir_pin=toolhead:PA0
# enable_pin=!toolhead:PA2
step_pin=toolhead:PB5
dir_pin=toolhead:PB6
enable_pin=!toolhead:PB7
microsteps=16
gear_ratio=52:10
rotation_distance=28.8
nozzle_diameter=0.4
filament_diameter=1.75
# heater_pin=toolhead:PB0
heater_pin=toolhead:PB8
# sensor_type=NTC R25 350
sensor_type=NTC 100K beta 4300
sensor_pin=toolhead:PA3
control=pid
pid_kp=25.989
pid_ki=3.397
pid_kd=49.705
min_temp=-100
max_temp=365
pressure_advance=0.04
pressure_advance_smooth_time=0.04
instantaneous_corner_velocity= 1
max_extrude_only_distance= 300
max_extrude_only_velocity=60
max_extrude_only_accel=5000
max_extrude_cross_section= 9999999
min_extrude_temp=-100

[tmc2209 extruder]
uart_pin=toolhead:PB11
uart_address=2
interpolate= True
run_current=0.8
hold_current=0.2
sense_resistor= 0.1

# 热床
[heater_bed]
heater_pin=PG13
sensor_pin=PH1  #GPADC1
sensor_type=NTC 100K beta 3950
control=pid
pid_Kp=46.504839
pid_Ki=1.453276
pid_Kd=372.038710
pwm_cycle_time=0.016
min_temp=-100
max_temp=125
ot_bed=130
# ot_bed=20

# 模型散热风扇 P0
[fan]
pin=toolhead:PA8
tachometer_pin=toolhead:PB15
tachometer_ppr= 2
tachometer_poll_interval= 0.001

# 喉管风扇
[heater_fan heatbreak_cooling_fan]
heater= extruder
# pin=toolhead:PB2
# tachometer_pin=toolhead:PB14
# pin=toolhead:PB14
# tachometer_pin=toolhead:PB13
pin=toolhead:PB13
tachometer_pin=toolhead:PB14
tachometer_poll_interval=0.001
fan_speed=1.

# 主板风扇
[controller_fan board_cooling_fan]
pin=PG15
stepper=stepper_x,stepper_y,stepper_z,extruder
fan_speed=1.0
idle_speed=0.0
idle_timeout=30
heater=extruder,heater_bed
tachometer_pin=PB9

# BOX风扇 箱体风扇 P3
[cavity_fan]
pin=PD17
tachometer_pin=PD16
A=1
B=0.7
C=0.3
D=1
E=0.3
T0=30
T1=38
T2=37


# 辅助散热风扇 P2
[fan_generic fan1]
pin=PD15
tachometer_pin=PD14

[virtual_sdcard]
path= /opt/usr/gcode
on_error_gcode=
power_outage_enable=1
print_start_gcode=\nSET_CONDITION J=0 A=PRINT_CALIBRATE B=1\nSET_CONDITION J=0 A=BED_MESH_PROFILE B=0\nBED_MESH_CALIBRATE PROFILE=default\nM400\nSAVE_CONFIG\nM400\nSET_CONDITION J=0 A=BED_MESH_PROFILE B=1\nBED_MESH_CALIBRATE PROFILE=default1\nM400\nSAVE_CONFIG\nM400\nSET_CONDITION_END\n\nSET_CONDITION J=0 A=BED_MESH_PROFILE B=0\nSET_CONDITION J=0 A=BED_MESH_DATEA B=0\nBED_MESH_CALIBRATE PROFILE=default\nM400\nSAVE_CONFIG\nM400\nSET_CONDITION_END\n\nSET_CONDITION J=0 A=BED_MESH_PROFILE B=1\nSET_CONDITION J=0 A=BED_MESH_DATEB B=0\nBED_MESH_CALIBRATE PROFILE=default1\nM400\nSAVE_CONFIG\nM400\nSET_CONDITION_END\n\nM400\nSET_CONDITION J=0 A=BED_MESH_PROFILE B=0\nM400\nSET_GCODE_OFFSET BED_ROUGHNESS=-0.06 MOVE=1 MOVE_SPEED=1\nM400\nBED_MESH_PROFILE LOAD=default\nSET_CONDITION_END\n\nSET_CONDITION J=0 A=BED_MESH_PROFILE B=1\nM400\nSET_GCODE_OFFSET BED_ROUGHNESS=-0.015 MOVE=1 MOVE_SPEED=1\nM400\nBED_MESH_PROFILE LOAD=default1\nSET_CONDITION_END\nM400\n
extrude_filament=M83\nG1 E100 F300\nM400
move_to_waste_box=G28 X Y\nG1 X52 Y245 F20000\nG1 Y264 F3000\nM400

[gcode_arcs]
resolution=0.3

[pause_resume]
# 暂停前的第一段移动，其中MANUAL_MOVE : 手动移动 避免移动到底部发生碰撞，
after_pause_gcode_macro1=M204 S10000\nG91\nG1 Y2 Z0.5 E-1 F6000\nG90\nMANUAL_MOVE Z=4.5 V=600\nG90\nM400
# 暂停前的第二段移动 移动到废料桶位置，随后降温至100℃，关闭模型风扇、辅助散热风扇（恢复时恢复）
after_pause_gcode_macro2=G90\nG1 X52 Y245 F20000\nG1 Y264 F3000\nM106 S0\nM106 P2 S0\nM400

# 恢复前的第一段移动，判断当前温度如果低于95°，等待加温至140°，后再次回到废料桶位置（避免用户可能会手动移动各轴坐标或后续有该需求），恢复后不再重复移动到废料桶位置
# 恢复前的第二段移动，判断是否存在canvas，不存在才需要执行该冲刷动作
# 恢复前的第三段移动，恢复前喷嘴已经泄压，预挤出1.5mm以保持腔压，避免恢复后缺料
before_resume_gcode_macro1=G90\nM204 S10000\nG1 x52 Y250 F10000\nG1 Y264 F3000\nM400
before_resume_gcode_macro2=M83\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nM400\nM106 S225\nG4 P3000\nM204 S18999\nG1 Y261.1 E-0.1 F10000\nG1 Y264.1 E-0.1\nM400\nG1 Y261.1 E-0.1\nG1 Y264.1 E-0.1\nM400\nG1 X64 F8000\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X52 Y245 F10000\nG1 Y264.5 F3000\nM400\nM106 S0\n
before_resume_gcode_macro3=M83\nG1 E1 F1200

# 取消打印后的移动，如果已经归零，才会执行这条动作
# 取消打印后的移动，关闭所有加热及其风扇，判断存在网床才需要设定网床，避免异常；最后解锁电机
cancel_print_gcode_macro1=M400\nG1 X52 Y245 F20000\nG1 Y264 F3000\nM400
cancel_print_gcode_macro2=M400\nG90\nM104 S0\nM140 S0\nM400\nM106 S0\nM106 P2 S0\nM400\nM106 P3 S0\nM204 S5000\nSET_CONDITION J=0 A=BED_MESH_DATEA B=1\nBED_MESH_PROFILE LOAD=default\nSET_CONDITION_END\nM84

[force_move]
enable_force_move=true
default_position=5,5,0   # 开机后的默认坐标，XY设置大于5，可避免首次归零前往正方向移动

[ztemperature_sensor box]
sensor_pin=PH0  #GPADC0
sensor_type=NTC 100K beta 3950
min_temp=-100
max_temp=110
ot_box=100

[verify_heater heater_bed]
max_error=60
check_gain_time=60#120
hysteresis=5
heating_gain=2

[verify_heater extruder]
max_error= 30
check_gain_time=20
hysteresis= 5
heating_gain= 2

[rfauto_detect]

# [update_ota]

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 53.6
shaper_type_y = mzv
shaper_freq_y = 44.8
damping_ratio_x = 0.1
damping_ratio_y = 0.1

[lis2dw]
cs_pin=toolhead:PA4
spi_speed=5000000
spi_software_sclk_pin=toolhead:PA5
spi_software_mosi_pin=toolhead:PA7
spi_software_miso_pin=toolhead:PA6
axes_map=x,y,z

[resonance_tester]
accel_chip = lis2dw
max_smoothing =1
min_freq = 5
max_freq = 90
accel_per_hz = 100
hz_per_sec = 2
probe_points = 128, 128, 5  # an example
shaper_calibrate_gcode=G28\n

[servo printer_servo]
servo_pin=PB7
servo_det_pin=PB2
minimum_pulse_width=0.001
maximum_pulse_width=0.002
maximum_servo_angle=180.
initial_angle=90.
initial_pulse_width=0.
M2801_open_angle=45 # 0-90°
M2801_open_time=10  # ms
M2801_close_angle=45 # 0-90°
M2801_close_time=400 # ms
servo_dir=1 # 调整舵机方向 1 or -1

[canvas_dev]
serial=/dev/ttyS1
baud=115200
canvas_ctrl_pin=host:PD21
filament_det_pin=!toolhead:PB1
nozzle_fan_off_pin=toolhead:PB0
cutting_knife_pin=!toolhead:PA2
wrap_filament_pin=!toolhead:PA1
model_det_pin=toolhead:PA0
pause_on_abnormal=true
# 喷头断料触发后的冲刷动作
runout_filament_gcode=M400\nG28 X Y TRY\nM204 S10000\nG90\nG1 X52 Y245 F10000\nG1 Y264.0 F3000\nM400\nM106 S25\nM83\nG92 E0\nG1 E10 F300\nG1 E5 F150\nM400\nG4 P1000\nM400\nM106 S225\nG4 P3000\nM204 S18999\nG1 Y261.1 E-0.1 F10000\nG1 Y264.1 E-0.1\nM400\nG1 Y261.1 E-0.1\nG1 Y264.1 E-0.1\nM400\nG1 X64 F8000\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X52 Y245 F10000\nG1 Y264.5 F3000\nM400\nM106 S0\nM204 S5000\nM106 S0\nM2202 gcode_action_report=2505\n
# 移动到切刀位置前
move_to_cutting_knift_macro=G28 X Y TRY\nM204 S10000\nG1 X245 Y25 F15000\nG1 X254.5 F3000\nG1 Y2.5 F600\nM400\n
# 切断耗材失败并重试
move_to_cutting_knift_retry_macro=G1 Y25 F15000\nG28 X Y\nM204 S10000\nG1 X245 Y25 F15000\nG1 X254.5 F3000\nG1 Y2.5 F600\nM400\n
# E轴回抽,释放切刀压力,并前往垃圾桶位置
release_cutting_knift_macro=M83\nG1 E-1 F120\nM400\nG1 Y25 F3000\nG1 X52 Y245 F20000\nG1 Y264 F3000\nM400\n
# 释放切刀压力失败并重试
release_cutting_knift_retry_macro=G1 E1.5 F120\nG1 E-2 F120\nM400
# 进退料更换耗材时，移动到废料桶
move_to_waste_box_macro=M400\nG28 X Y TRY\nM104 S250\nG1 X52 Y245 F10000\nG1 Y264.5 F3000\nM109 S250\n
# 进料后冲刷
clean_waste_filament_macro=\nM400\nM83\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nG1 E7.70804 F360\nG1 E0.856449 F50\nM400\nM106 S225\nG4 P3000\nM204 S18999\nG1 Y261.1 E-0.1 F10000\nG1 Y264.1 E-0.1\nM400\nG1 Y261.1 E-0.1\nG1 Y264.1 E-0.1\nM400\nG1 X64 F8000\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X64\nG1 X80 E-0.1\nG1 X52 Y245 F10000\nG1 Y264.5 F3000\nM400\nM106 S0\nM204 S5000\nM104 S0\n
# 进退料参数
gear_pole_number=5      # 齿轮极对数
motor_pole_number=2     # 电机极对数
motor_speed=50          # 多色通道电机转速
motor_accel=500         # 多色通道电机加速度
pre_load_fila_dist=150  # 预进料距离
load_fila_dist=1000     # 进料距离
#取消 load_wait_time=0.5      # 进料时耗材触发后等待时间防止耗材未被咬住
load_fila_det_count=2  # 当前通道自检次数
load_fila_det_dist=5   # 当前通道自检里程
load_fila_ex_gcode_1=M83\nG1 E5 F300\nM400    # 当前通道自检挤出机移动宏
load_fila_ex_gcode_2=M83\nG1 E10 F300\nM400   # 当前通道自检挤出机移动宏
unload_fila_dist=80     # 退料距离 范围(60-350）
fila_det_dist=30        # 耗材检测距离
mesh_gear_dist=5#30     # 齿轮啮合距离
pre_load_fila_time=10   # 预进料超时时间
load_fila_time=30#2     # 进料超时时间
unload_fila_time=30#1   # 退料超时时间
fila_det_time=2         # 耗材检测超时时间
