extruder_timeout_gcode=M400\nM104 S0\nM400\nSET_CONDITION J=0 A=NOZZLE_TEMP B=170\nM104 S0\nSET_CONDITION_END\nM400
heater_bed_idle_timeout=600
heater_bed_idle_timeout_min=60
heater_bed_idle_timeout_max=259200

[pid_calibrate]
pid_calibrate_gcode=G90\nG28 X Y TRY\nM204 S10000\nG1 X52 Y245 F12000\nG1 Y264 F1500\nM400\n

[output_pin led_pin]
pin=PB5
value=0

