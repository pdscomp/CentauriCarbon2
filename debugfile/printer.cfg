[printer]
kinematics=corexy
max_velocity= 500
max_accel= 20000
max_z_velocity= 50
max_z_accel= 1200
x_range=0,256
y_range=0,256
z_range=0,256
square_corner_velocity=9.
broker_address=tcp://broker.emqx.io:1883
client_id=paho_async_cpp_demo

[mcu]
serial=/dev/ttyS4
baud=250000
restart_method= command

[mcu toolhead]
serial=/dev/ttyS1
baud=250000
power_pin=host:PE14
restart_method=command

[mcu bed_sensor]
serial=/dev/ttyS0
baud=500000
power_pin=host:PE15
restart_method= command

# Steppers
[stepper_x]
step_pin=PA1
dir_pin=!PA7
enable_pin=!PA4
microsteps=16
rotation_distance=39.872
endstop_pin=tmc2209_stepper_x:virtual_endstop
position_endstop=-2
position_min=-2.1
position_max=256.5
# 默认不生效,会被homing_override覆盖
homing_speed=60
homing_retract_dist=0

[tmc2209 stepper_x]
uart_pin=PA3
uart_address=0
interpolate=True
run_current=1.2
hold_current=0.8
sense_resistor=0.1
driver_SGTHRS=130
diag_pin=PA5
# stealthchop_threshold=0

[stepper_y]
step_pin=PA6
dir_pin=!PC4
enable_pin=!PB0
microsteps=16
rotation_distance=39.872
endstop_pin=tmc2209_stepper_y:virtual_endstop
position_endstop=-2
position_min=-2.1
position_max=270.000000
# 默认不生效,会被homing_override覆盖
homing_speed=60
homing_retract_dist=0

[tmc2209 stepper_y]
uart_pin=PA3
uart_address=3
interpolate=True
run_current=1.2
hold_current=0.8
sense_resistor=0.1
driver_SGTHRS=130
diag_pin=PC5
# stealthchop_threshold=0

[stepper_z]
step_pin=PA8
dir_pin=!PB10
enable_pin=!PB12
microsteps=16
rotation_distance=8
endstop_pin=probe:z_virtual_endstop
# endstop_pin=^PB5
# endstop_pin=tmc2209_stepper_z:virtual_endstop
position_endstop=0
position_min=-10
position_max=258.000000
homing_speed=10
homing_retract_dist=1
second_homing_speed=5

[tmc2209 stepper_z]
uart_pin=PA3
uart_address=1
interpolate=True
run_current=1.0
sense_resistor=0.1
driver_SGTHRS=120
diag_pin=PB1
# stealthchop_threshold=0

# 挤出机
[extruder]
step_pin=toolhead:PA1
dir_pin=toolhead:PA0
enable_pin=!toolhead:PA2
microsteps=16
gear_ratio=52:10
rotation_distance=28.8
nozzle_diameter=0.4
filament_diameter=1.75
heater_pin=toolhead:PB0
sensor_type=NTC 100K beta 4300
sensor_pin=toolhead:PA3
control=pid
pid_kp=25.989
pid_ki=3.397
pid_kd=49.705
min_temp=-100
max_temp=600
pressure_advance=0.04
pressure_advance_smooth_time=0.04
instantaneous_corner_velocity= 1
max_extrude_only_distance= 300
max_extrude_only_velocity=60
max_extrude_only_accel=5000
max_extrude_cross_section= 9999999
min_extrude_temp=-100

[tmc2209 extruder]
uart_pin=toolhead:PB11
uart_address=2
interpolate= True
run_current=0.8
hold_current=0.2
sense_resistor= 0.1

# 热床
[heater_bed]
heater_pin=PA0
sensor_pin=PC2
sensor_type=NTC 100K beta 3950
control=pid
pid_Kp=46.504839
pid_Ki=1.453276
pid_Kd=372.038710
pwm_cycle_time=0.016
min_temp=-100
max_temp=125

# 模型散热风扇 P0
[fan]
pin=toolhead:PA8
tachometer_pin=toolhead:PB15
tachometer_ppr= 2
tachometer_poll_interval= 0.001

# 喉管风扇
[heater_fan heatbreak_cooling_fan]
heater= extruder
# pin=toolhead:PB2
# tachometer_pin=toolhead:PB14
pin=toolhead:PB14
tachometer_pin=toolhead:PB13
tachometer_poll_interval=0.001

# 主板风扇
[controller_fan board_cooling_fan]
pin=PB4
stepper=stepper_x,stepper_y,stepper_z,extruder
fan_speed=1.0
idle_speed=0.0
idle_timeout=30
heater=extruder,heater_bed
tachometer_pin=PB3

# BOX风扇 箱体风扇 P3
[fan_generic box_fan]
pin=PC8

# 辅助散热风扇 P2
[fan_generic fan1]
pin=PC9

[virtual_sdcard]
path= /opt/usr/gcode
on_error_gcode=
power_outage_enable=1

[gcode_arcs]
resolution=0.3

[pause_resume]
after_pause_gcode_macro1=M204 S10000\nG91\nG1 Y2 Z0.5 E-1 F6000\nG90\nMANUAL_MOVE Z=4.5 V=600\nG90\nM400
after_pause_gcode_macro2=G90\nG1 X202 Y250 F20000\nG1 Y264 F3000\nM104 S100\nM106 S0\nM106 P2 S0\nM400
before_resume_gcode_macro1=G90\nM204 S10000\nG1 x202 Y250 F10000\nG1 Y264 F3000\nM400
before_resume_gcode_macro2=G4 P2000\nM83\nG92 E0\nG1 E10 F300\nM400\nG4 P2000\nG1 E10 F150\nM400\nG1 E10 F300\nM400\nM106 S200\nG4 P2000\nG1 X188 E-0.5 F10000\nG1 Y256 E-0.1\nG1 X202\nG1 Y263 E-0.1 F3000\nG1 X188 F10000\nG1 Y256 E-0.1\nG1 X202\nG1 Y263 E-0.1 F3000\nG1 X187\nG1 X168 E-0.1\nG1 X187\nG1 X168 E-0.1\nG1 x187\nG1 X176 E-0.1
before_resume_gcode_macro3=M83\nG1 E1.5 F1200
cancel_print_gcode_macro1=M400\nG1 X202 Y250 F20000\nG1 Y264 F3000
cancel_print_gcode_macro2=M400\nG90\nM104 S0\nM140 S0\nM106 S0\nM106 P2 S0\nM106 P3 S0\nM204 S5000\nM900 K0.02\nBED_MESH_PROFILE LOAD=default\nM84

[force_move]
enable_force_move=true
default_position=0,0,0

[ztemperature_sensor box]
sensor_pin=PC3
sensor_type=NTC 100K beta 3950
min_temp=-100
max_temp=80

[verify_heater heater_bed]
max_error=60
check_gain_time=60#120
hysteresis=5
heating_gain=2

[verify_heater extruder]
max_error= 30
check_gain_time=20
hysteresis= 5
heating_gain= 2

[rfauto_detect]

# [update_ota]

[input_shaper]
shaper_type_x = mzv
shaper_freq_x = 53.6
shaper_type_y = mzv
shaper_freq_y = 44.8
damping_ratio_x = 0.1
damping_ratio_y = 0.1

[lis2dw]
cs_pin=toolhead:PA4
spi_speed=5000000
spi_software_sclk_pin=toolhead:PA5
spi_software_mosi_pin=toolhead:PA7
spi_software_miso_pin=toolhead:PA6
axes_map=x,y,z

[resonance_tester]
accel_chip = lis2dw
max_smoothing =1
min_freq = 5
max_freq = 90
accel_per_hz = 100
hz_per_sec = 2
probe_points = 128, 128, 5  # an example

[canvas_dev]
serial=/dev/ttyS3
baud=115200
filament_det_pin=!toolhead:PB3
nozzle_fan_off_pin=toolhead:PB4
cutting_knife_pin=!toolhead:PB5
